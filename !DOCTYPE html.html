<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hello World</title>

  <style>
    /* --- Motion Background --- */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: #fff;
    }

    /* Animated gradient */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, #1e90ff, #6a5acd, #ff6b6b, #ffa502);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
      z-index: -1;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Card */
    .card {
      padding: 40px 60px;
      background-color: rgba(0, 0, 0, 0.35);
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      text-align: center;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.5rem;
    }

    p {
      margin: 0 0 20px;
      opacity: 0.9;
    }

    /* Language selector */
    select {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="animated-bg"></div>

  <div class="card">
    <h1 id="title">Hello, World!</h1>
    <p id="subtitle">Welcome to your very first web page.</p>

    <select id="languageSelector">
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="es">Español</option>
    </select>
  </div>

  <script>
    const translations = {
      en: {
        title: "Hello, World!",
        subtitle: "Welcome to your very first web page."
      },
      fr: {
        title: "Bonjour, le monde!",
        subtitle: "Bienvenue sur votre toute première page web."
      },
      es: {
        title: "¡Hola, Mundo!",
        subtitle: "Bienvenido a tu primera página web."
      }
    };

    document.getElementById("languageSelector").addEventListener("change", function () {
      const lang = this.value;
      document.getElementById("title").textContent = translations[lang].title;
      document.getElementById("subtitle").textContent = translations[lang].subtitle;
    });
  </script>
</body>
</html>
